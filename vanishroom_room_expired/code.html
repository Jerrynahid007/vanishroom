<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-ember-canvas {
            background: radial-gradient(circle at center, rgba(204, 55, 0, 0.4) 0%, rgba(26, 26, 26, 0.9) 70%),

        }

<body class="bg-ash-900 text-ash-200 min-h-screen font-body-md text-body-md overflow-hidden relative">
<!-- Accelerated Ember Canvas Background (Simulated) -->
<div class="absolute inset-0 z-0 bg-ember-canvas opacity-80 backdrop-blur-sm pointer-events-none"></div>
<!-- Underlying Chat Interface (Blurred & Darkened) -->
<div class="absolute inset-0 z-10 flex flex-col blur-md opacity-20 pointer-events-none">
<!-- Header Mock -->
<header class="flex justify-between items-center h-header-height px-gutter-sm bg-surface/80">
<span class="font-display-lg-mobile text-display-lg-mobile text-primary tracking-tight">VanishRoom</span>
<div class="flex gap-4">
<span class="material-symbols-outlined text-primary">timer</span>
<span class="material-symbols-outlined text-primary">group</span>
</div>
</header>
<!-- Chat Stream Mock -->
<div class="flex-1 p-gutter-sm flex flex-col gap-4 overflow-hidden">
<div class="bg-ash-700 p-4 rounded-[16px] rounded-bl-none max-w-[75%] self-start">
<p>Are we still meeting at 8?</p>
</div>
<div class="bg-[#CC3700] p-4 rounded-[16px] rounded-br-none max-w-[75%] self-end">
<p>Yes, same place as last time.</p>
</div>
<div class="bg-ash-700 p-4 rounded-[16px] rounded-bl-none max-w-[75%] self-start">
<p>Perfect. The password is still 'ember' right?</p>
</div>
</div>
</div>
<!-- The Overlay (Full Dark, High Opacity) -->
<div class="fixed inset-0 z-50 bg-[rgba(0,0,0,0.9)] backdrop-blur-md flex flex-col items-center justify-center px-gutter-sm md:px-gutter-md">
<!-- Central Content Modal -->
<div class="bg-ash-800 border border-ash-700 p-8 rounded-xl max-w-container-max-mobile w-full flex flex-col items-center text-center shadow-[0_0_40px_rgba(255,69,0,0.1)] transition-transform duration-500 transform scale-100">
<!-- Extinguished Icon/Emoji -->
<div class="w-24 h-24 bg-ash-900 rounded-full flex items-center justify-center mb-6 shadow-[inset_0_0_20px_rgba(0,0,0,0.5)] border border-ash-700 relative">
<span class="material-symbols-outlined text-[48px] text-ash-500 absolute opacity-50" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<div class="absolute inset-0 rounded-full border border-ash-600 opacity-20"></div>
</div>
<!-- Heading -->
<h1 class="font-h1 text-h1 text-ash-400 mb-2">This room has burned out.</h1>
<!-- Redirect Text -->
<p class="font-label-timer text-label-timer text-ash-500 mb-8 flex items-center gap-2">
<span class="material-symbols-outlined text-[20px] text-fire-600 animate-pulse">hourglass_empty</span>
                Redirecting in 5...
            </p>
<!-- Primary CTA -->
<button class="w-full bg-gradient-to-r from-fire-500 to-fire-600 text-[#ffffff] font-body-md text-body-md font-[600] py-4 px-6 rounded-lg hover:scale-[1.02] hover:shadow-[0_0_12px_rgba(255,69,0,0.3)] transition-all duration-200 flex justify-center items-center gap-2 group">
<span class="material-symbols-outlined group-hover:rotate-90 transition-transform duration-300">add_circle</span>
                Create New Room
            </button>
</div>
<!-- Footer Overlay -->
<footer class="absolute bottom-0 w-full py-8 mt-auto flex flex-col items-center gap-4 text-center z-50">
<div class="font-display-lg-mobile text-display-lg-mobile text-primary font-bold opacity-30 scale-75">VanishRoom</div>
</footer>
</div>
