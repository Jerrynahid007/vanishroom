<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VanishRoom - Join Room</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#601400",
                        "inverse-surface": "#fddbd3",
                        "ash-400": "#808080",
                        "on-background": "#fddbd3",
                        "error": "#FF3B30",
                        "surface-container-lowest": "#190a06",
                        "ash-300": "#B0B0B0",
                        "outline-variant": "#5d4038",
                        "on-secondary-fixed-variant": "#6e3900",
                        "on-surface-variant": "#e7bdb2",
                        "on-secondary-container": "#603100",
                        "tertiary-fixed-dim": "#a5c8ff",
                        "pure-black": "#000000",
                        "secondary-fixed-dim": "#ffb77d",
                        "surface-bright": "#49342f",
                        "ash-200": "#E1E1E1",
                        "on-secondary": "#4d2600",
                        "on-error": "#690005",
                        "on-tertiary-container": "#002a53",
                        "fire-600": "#CC3700",
                        "primary": "#ffb5a0",
                        "on-secondary-fixed": "#2f1500",
                        "ash-500": "#666666",
                        "on-error-container": "#ffdad6",
                        "surface-variant": "#44302a",
                        "primary-container": "#ff5625",
                        "primary-fixed-dim": "#ffb5a0",
                        "success": "#34C759",
                        "error-container": "#93000a",
                        "tertiary-fixed": "#d4e3ff",
                        "primary-fixed": "#ffdbd1",
                        "tertiary": "#a5c8ff",
                        "on-tertiary-fixed-variant": "#004785",
                        "inverse-primary": "#b12d00",
                        "on-primary-fixed": "#3b0900",
                        "surface": "#1f0f0b",
                        "tertiary-container": "#2592ff",
                        "secondary": "#ffb77d",
                        "on-tertiary": "#00315e",
                        "ash-800": "#1A1A1A",
                        "fire-500": "#FF4500",
                        "surface-container": "#2d1b16",
                        "secondary-container": "#fd8b00",
                        "inverse-on-surface": "#402c26",
                        "on-surface": "#fddbd3",
                        "outline": "#ad887e",
                        "secondary-fixed": "#ffdcc3",
                        "surface-container-high": "#392520",
                        "surface-container-low": "#291712",
                        "on-primary-container": "#541100",
                        "ash-600": "#4D4D4D",
                        "surface-tint": "#ffb5a0",
                        "ash-700": "#2A2A2A",
                        "ash-900": "#0A0A0A",
                        "background": "#1f0f0b",
                        "surface-dim": "#1f0f0b",
                        "surface-container-highest": "#44302a",
                        "on-primary-fixed-variant": "#872000",
                        "on-tertiary-fixed": "#001c3a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter-sm": "16px",
                        "container-max-mobile": "360px",
                        "input-bar-height": "60px",
                        "container-max-desktop": "420px",
                        "header-height": "56px",
                        "gutter-md": "20px"
                    },
                    "fontFamily": {
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "room-code": ["Plus Jakarta Sans"],
                        "body-sm": ["Plus Jakarta Sans"],
                        "label-timer": ["Plus Jakarta Sans"],
                        "h1": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "display-lg-mobile": ["Plus Jakarta Sans"],
                        "label-caps": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "display-lg": ["56px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "room-code": ["56px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "900" }],
                        "body-sm": ["14px", { "lineHeight": "1.4", "fontWeight": "400" }],
                        "label-timer": ["18px", { "lineHeight": "1", "fontWeight": "700" }],
                        "h1": ["24px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "body-lg": ["19px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "display-lg-mobile": ["40px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "label-caps": ["12px", { "lineHeight": "1", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-surface h-screen w-full flex flex-col relative overflow-hidden font-body-md text-body-md antialiased selection:bg-fire-500/30 selection:text-on-surface">
<!-- Ambient Background Embers (Simulated) -->
<div class="absolute inset-0 bg-[radial-gradient(ellipse_at_bottom,_var(--tw-gradient-stops))] from-surface-container-high via-background to-background z-0"></div>
<!-- TopAppBar (Background Context) -->
<header class="fixed top-0 w-full z-10 bg-surface/80 dark:bg-surface/80 backdrop-blur-md shadow-[0_0_20px_rgba(255,69,0,0.15)]">
<div class="flex justify-between items-center h-header-height px-gutter-sm md:px-gutter-md max-w-container-max-desktop mx-auto">
<h1 class="font-display-lg-mobile text-display-lg-mobile md:font-display-lg md:text-display-lg text-primary tracking-tight">VanishRoom</h1>
<div class="flex gap-4 items-center">
<button class="hover:scale-105 hover:shadow-[0_0_12px_rgba(255,69,0,0.3)] transition-all duration-200 text-primary flex items-center justify-center p-2 rounded-full">
<span class="material-symbols-outlined">timer</span>
</button>
<button class="hover:scale-105 hover:shadow-[0_0_12px_rgba(255,69,0,0.3)] transition-all duration-200 text-primary flex items-center justify-center p-2 rounded-full">
<span class="material-symbols-outlined">group</span>
</button>
</div>
</div>
</header>
<!-- Dummy Main Content Area (Background Context) -->
<main class="flex-1 flex flex-col items-center justify-center z-10 relative px-gutter-sm w-full max-w-container-max-desktop mx-auto mt-header-height">
<div class="w-24 h-24 rounded-full bg-ash-800 border border-ash-700 shadow-[0_0_15px_rgba(255,69,0,0.1)] flex items-center justify-center mb-8 opacity-50">
<span class="material-symbols-outlined text-4xl text-ash-500">add</span>
</div>
<div class="h-12 w-48 bg-ash-800 rounded-xl opacity-50"></div>
</main>
<!-- Footer (Background Context) -->
<footer class="w-full py-8 mt-auto z-10 bg-transparent flex flex-col items-center gap-4 text-center">
<div class="text-primary font-bold font-body-sm text-body-sm">VanishRoom</div>
<div class="flex gap-6">
<a class="font-body-sm text-body-sm text-ash-500 hover:text-fire-500 transition-colors" href="#">Privacy Policy</a>
<a class="font-body-sm text-body-sm text-ash-500 hover:text-fire-500 transition-colors" href="#">Terms of Service</a>
<a class="font-body-sm text-body-sm text-ash-500 hover:text-fire-500 transition-colors" href="#">Security</a>
</div>
<div class="font-body-sm text-body-sm text-ash-400">VanishRoom © 2024. All messages are ephemeral.</div>
</footer>
<!-- JOIN ROOM MODAL OVERLAY -->
<div class="fixed inset-0 z-50 bg-pure-black/80 backdrop-blur-[4px] flex items-center justify-center px-4 transition-opacity duration-300">
<!-- Modal Card -->
<div class="bg-ash-800 rounded-[20px] p-[24px] w-full max-w-[380px] border border-ash-700 shadow-[0_8px_32px_rgba(0,0,0,0.6)] transform scale-100 transition-transform duration-300 relative overflow-hidden">
<!-- Subtle Top Glow -->
<div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-transparent via-fire-500/20 to-transparent"></div>
<!-- Header -->
<h2 class="font-h1 text-h1 text-on-surface text-center mb-6 tracking-tight">Enter Room Code</h2>
<!-- Input Form Area -->
<div class="flex flex-col mb-8 relative">
<!-- Input Field (Error State) -->
<input autocomplete="off" class="h-[48px] w-full bg-ash-700 rounded-xl px-4 text-on-surface placeholder:text-ash-500 font-body-lg text-body-lg text-center tracking-[0.1em] uppercase border border-error outline-none transition-colors duration-200 focus:border-error focus:ring-1 focus:ring-error shadow-[0_0_10px_rgba(255,59,48,0.1)]" placeholder="Enter code..." spellcheck="false" type="text" value="X7K9-DEAD"/>
<!-- Error Message -->
<div class="absolute -bottom-6 inset-x-0 flex items-center justify-center gap-1.5 text-error">
<span class="material-symbols-outlined text-[14px]">warning</span>
<span class="font-body-sm text-body-sm">Room not found or expired</span>
</div>
</div>
<!-- Action Button (Disabled State) -->
<button class="w-full h-[48px] rounded-xl flex items-center justify-center font-body-md text-body-md font-semibold bg-ash-700 text-ash-500 cursor-not-allowed transition-all duration-200 border border-transparent" disabled="">
                Join
            </button>
</div>
</div>
</body></html>
